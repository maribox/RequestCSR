name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Determine next version from conventional commits
        id: version
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          # Analyze commits since last tag for conventional commit prefixes
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
              BUMP="major"; break
            elif echo "$msg" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          # Apply bump
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          CODE=$(git rev-list --count HEAD)
          TAG="v${NEW_VERSION}"

          echo "name=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP -> $NEW_VERSION (code $CODE)"

      - name: Decode keystore
        id: keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore
          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: steps.keystore.outputs.exists == 'true'
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.name }} \
            -PAPP_VERSION_CODE=${{ steps.version.outputs.code }}

      - name: Build debug APK (fallback when no keystore)
        if: steps.keystore.outputs.exists != 'true'
        run: |
          ./gradlew :app:assembleDebug \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.name }} \
            -PAPP_VERSION_CODE=${{ steps.version.outputs.code }}

      - name: Prepare APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          DEST="requestcsr-${{ steps.version.outputs.name }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            "${{ steps.apk.outputs.path }}" \
            --title "RequestCSR ${{ steps.version.outputs.name }}" \
            --generate-notes \
            --latest
